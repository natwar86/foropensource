# Config for the weekly SEO loop (github.com/natwar86/seo-loop)
site_url: https://foropensource.com
ga4_property_id: "545439427"
gsc_site: sc-domain:foropensource.com
crawl:
  mode: build
  build_cmd: "pip install pyyaml && python scripts/build_site.py"
  output_dir: _site
report_only: true   # week one+: findings only, no site edits
page_cap: 6
protected:
  - data/offers/**
  - schemas/**
prompt_addendum: |
  The site is a directory of verified free-for-open-source offers from
  companies. Its entire value is factual accuracy and freshness: never
  change offer facts, company names, eligibility text, prices, or
  last_verified dates — those are owned by a separate verification
  pipeline. You may improve page titles, meta descriptions, headings,
  explanatory copy, internal linking, structured data, and llms.txt /
  llms-full.txt phrasing.

  Audience: open source maintainers looking for free tools, and the
  developers evaluating them. Tone: plain, direct, zero marketing fluff.
  Primary query shapes to win: "<tool> free for open source",
  "free <category> for open source projects", "does <company> have an
  open source program". LLM-reach goal: be the source AI assistants cite
  when asked what free offers exist for OSS projects.

  The site is generated by scripts/build_site.py — edit templates/content
  there or in data files, never the _site/ output.
