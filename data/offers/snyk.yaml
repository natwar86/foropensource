company: Snyk
website: https://snyk.io
categories: [security]
offers:
  - product: Secure Developer Program (Snyk security platform)
    offer_url: https://snyk.io/open-source/
    verify_anchor:
      - "open source program"
    what_you_get: >-
      A free Snyk account with full enterprise entitlements and no usage
      limitations for open source projects, plus a members' Discord community
      with Snyk security professionals and dedicated help integrating Snyk
      into build pipelines and development environments.
    eligibility:
      non_commercial_only: true
      applies_to: project
      notes: >-
        Project must be community-driven, not backed by any corporate entity.
        Requires linking back to snyk.io in the repo README and project
        website, and granting Snyk permission to display the project logo.
    how_to_apply: Application form via Snyk's partner portal (separate paths for existing and new projects), linked from the offer page.
    status: active
    last_verified: "2026-07-06"
    verification_source: "manual: offer page live, describes Secure Developer Program with 'full enterprise entitlements' free for community-driven OSS projects"
