company: packagecloud
website: https://packagecloud.io
categories: [other]
offers:
  - product: Free for Open Source program (hosted package repositories)
    offer_url: https://blog.packagecloud.io/packagecloud-loves-oss/
    what_you_get: >-
      Free hosted package repositories (APT/DEB, YUM/RPM, npm, Maven, PyPI,
      RubyGems, etc.) for open source projects, beyond the generic free plan
      (2 GB storage / 10 GB bandwidth); the program announcement describes
      free hosting for OSS packages, with partner projects such as Phalcon
      and StackStorm.
    eligibility:
      applies_to: project
      notes: Must have an open source project; detailed criteria not published, granted on request.
    how_to_apply: Sign up for the free 14-day trial at packagecloud.io, then contact packagecloud support to request the Free for Open Source program.
    status: active
    last_verified: "2026-07-06"
    verification_source: "manual: blog post (2021-11-17) describing Free for Open Source program live; pricing page confirms free plan exists but OSS program is by request"
