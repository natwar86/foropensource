company: 1Password
website: https://1password.com
categories: [security]
offers:
  - product: 1Password Teams (Open Source Program)
    offer_url: https://github.com/1Password/1password-teams-open-source
    verify_anchor:
      - "1Password team account for free"
    what_you_get: >-
      Free 1Password Teams account for the project team, on all platforms
      (Mac, Windows, iOS, Android, Linux, browser), including developer
      features such as SSH key management, Git commit signing, CLI
      authentication with biometrics, and secrets management integration.
    eligibility:
      min_project_age_months: 1
      active_development_required: true
      non_commercial_only: true
      applies_to: project
      notes: >-
        Team accounts only (not personal/family/business). Project must be
        at least 30 days old, active, under a permissive open source
        license, with the applicant as core contributor; no commercial
        backing (open source funding programs are OK). Open source
        meetup/event/conference organizers also eligible.
    how_to_apply: >-
      Create a 1Password Teams account (14-day trial), invite at least one
      other Owner, then apply by opening an issue in the
      1Password/1password-teams-open-source GitHub repo.
    renewal: Membership tied to the program; contact opensource@1password.com for issues.
    status: active
    last_verified: "2026-07-06"
    verification_source: "manual: GitHub repo live, program active; free Teams account for OSS projects 30+ days old under permissive license"
