company: Datadog
website: https://www.datadoghq.com
categories: [monitoring, security]
offers:
  - product: Datadog observability platform (Open Source Projects program)
    offer_url: https://www.datadoghq.com/partner/open-source/
    what_you_get: >-
      Free Datadog account for the project's own infrastructure: cloud
      observability and security platform including infrastructure and
      APM monitoring, 1,000+ integrations, code analysis and profiling,
      and database/user activity monitoring. Host counts and telemetry
      event volumes may be limited.
    eligibility:
      osi_license_required: true
      min_project_age_months: 12
      non_commercial_only: true
      applies_to: project
      notes: >-
        Minimum 5 regular contributors; at least 2 maintainers must work
        for different companies. Monitored infrastructure must directly
        support the project itself (monitoring third-party instances of
        the project is out of scope). Projects are asked to tell the
        community how they use Datadog.
    how_to_apply: >-
      Application form on the partner program page; Datadog evaluates
      submissions case by case.
    status: active
    last_verified: "2026-07-06"
    verification_source: "manual: datadoghq.com/partner/open-source/ live; free accounts for non-commercial OSS projects 1+ year old with 5+ contributors"
