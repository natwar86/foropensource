company: Icons8
website: https://icons8.com
categories: [design]
offers:
  - product: Icons8 graphics for open source projects
    offer_url: https://icons8.com/license
    what_you_get: >-
      Free Icons8 graphics for established open source projects — the license
      page states "Established open-source projects can get our graphics for
      free. For you, we'll open-source the needed resources." (Distinct from
      the generic free tier, which requires a visible link/attribution to
      icons8.com everywhere assets are used.)
    eligibility:
      applies_to: project
      notes: Must be an "established" open source project; no further criteria published.
    how_to_apply: Contact the Icons8 support team via the "Contact us" link on the license page.
    status: active
    last_verified: "2026-07-06"
    verification_source: "manual: license page live, quotes 'Established open-source projects can get our graphics for free'"
