categories: [ide-tools]
offers:
  - product: JProfiler (open source license)
    offer_url: https://www.ej-technologies.com/jprofiler/openSource
    what_you_get: >-
      Free JProfiler (Java profiler) licenses covering a project's core
      committers, granted in exchange for a link to the JProfiler site
      (preferably a text link containing "Java profiler", no nofollow).
    eligibility:
      non_commercial_only: true
      applies_to: contributors
      notes: >-
        Non-profit open source projects with an established website and a
        released product.
    how_to_apply: >-
      Online form on the offer page (project name, website URL, contact,
      number of developers); processing up to 24 hours, license sent by
      email.
    status: active
    last_verified: "2026-07-06"
    verification_source: "manual: jprofiler/openSource page live, free licenses for non-profit OSS projects in exchange for a backlink"
